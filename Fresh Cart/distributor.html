<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Select Distributor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f1f8e9;
      padding: 40px;
      margin: 0;
    }
    h1 {
      text-align: center;
      color: #2e7d32;
    }
    .distributor-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .distributor-card {
      background-color: #c8e6c9;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.2s, border 0.2s;
      border: 2px solid transparent;
    }
    .distributor-card:hover {
      transform: scale(1.03);
      border-color: #388e3c;
    }
    .distributor-card.selected {
      border: 3px solid #1b5e20;
      background-color: #a5d6a7;
    }
    .distributor-card h3 {
      margin: 0;
      color: #1b5e20;
    }
    .distributor-card p {
      margin: 6px 0;
      color: #4e734e;
    }
    .proceed-button {
      display: block;
      margin: 40px auto 0;
      background-color: #388e3c;
      color: white;
      padding: 14px 32px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }
    .proceed-button:hover {
      background-color: #2e7d32;
    }
    .search-container {
      text-align: center;
      margin-bottom: 30px;
    }
    .search-container input {
      padding: 10px;
      width: 300px;
      border: 2px solid #388e3c;
      border-radius: 8px;
    }
    .search-container button {
      padding: 10px 20px;
      background-color: #388e3c;
      color: white;
      border: none;
      border-radius: 8px;
      margin-left: 10px;
      cursor: pointer;
    }
    .search-container button:hover {
      background-color: #2e7d32;
    }
  </style>
</head>
<body>

  <h1>Select a Distributor</h1>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Search distributor by name or location" />
    <button onclick="searchDistributors()">Search</button>
  </div>

  <div class="distributor-list" id="distributorList">
    <!-- Distributors will be added here -->
  </div>

  <button class="proceed-button" onclick="proceed()">Proceed</button>

  <script>
    const distributors = [
      {
        name: "GreenFresh Distributors",
        location: "Sector 12, Green City",
        charge: "₹40",
        delivery: "2-3 days"
      },
      {
        name: "QuickDrop Logistics",
        location: "Industrial Area, Zone B",
        charge: "₹30",
        delivery: "1-2 days"
      },
      {
        name: "Urban Organic Supplies",
        location: "Downtown Street, Main Road",
        charge: "₹50",
        delivery: "3-4 days"
      },
      {
        name: "RuralCart Solutions",
        location: "Village Hub, NH17",
        charge: "₹35",
        delivery: "2-3 days"
      }
    ];

    let filteredDistributors = [...distributors];
    const distributorList = document.getElementById("distributorList");

    function renderDistributors(list) {
      distributorList.innerHTML = "";
      list.forEach((distributor, index) => {
        const card = document.createElement("div");
        card.classList.add("distributor-card");
        card.innerHTML = `
          <h3>${distributor.name}</h3>
          <p><strong>Location:</strong> ${distributor.location}</p>
          <p><strong>Delivery Charge:</strong> ${distributor.charge}</p>
          <p><strong>Estimated Delivery:</strong> ${distributor.delivery}</p>
        `;
        card.onclick = () => selectDistributor(index);
        distributorList.appendChild(card);
      });
    }

    renderDistributors(filteredDistributors);

    let selectedIndex = null;

    function selectDistributor(index) {
      const cards = document.querySelectorAll(".distributor-card");
      cards.forEach(card => card.classList.remove("selected"));
      cards[index].classList.add("selected");
      selectedIndex = index;
    }

    function proceed() {
      if (selectedIndex === null) {
        alert("Please select a distributor before proceeding.");
        return;
      }
      const selected = distributors[selectedIndex];
      alert(`Order will be assigned to ${selected.name}. Estimated delivery: ${selected.delivery}`);
      // Redirect or send to Firebase here
      window.location.href = "payment.html"; // Or order summary
    }

    function searchDistributors() {
      const query = document.getElementById("searchInput").value.toLowerCase();

      filteredDistributors = distributors.filter(distributor => 
        distributor.name.toLowerCase().includes(query) || 
        distributor.location.toLowerCase().includes(query)
      );

      renderDistributors(filteredDistributors);
    }
  </script>

</body>
</html>
