<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Distributor Dashboard</title>
  <style>
    body {
      background-color: #f1f8e9;
      font-family: Arial, sans-serif;
      padding: 40px;
      margin: 0;
    }
    h1 {
      color: #2e7d32;
      text-align: center;
    }
    .filter-container {
      text-align: center;
      margin-top: 20px;
    }
    select {
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 16px;
      border: 1px solid #a5d6a7;
    }
    .order-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }
    .order-card {
      background-color: #c8e6c9;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }
    .order-card:hover {
      transform: translateY(-5px);
    }
    .order-title {
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 10px;
      color: #1b5e20;
    }
    .order-detail {
      margin-bottom: 6px;
      color: #4e944f;
    }
    .status-btn {
      background-color: #388e3c;
      color: white;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
    .status-btn:hover {
      background-color: #2e7d32;
    }
    .add-product {
      display: block;
      margin: 30px auto 0;
      padding: 14px 28px;
      font-size: 16px;
      background-color: #43a047;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }
    .add-product:hover {
      background-color: #2e7d32;
    }
  </style>
</head>
<body>
  <h1>Welcome, Distributor</h1>

  <div class="filter-container">
    <label for="statusFilter"><strong>Filter by status:</strong> </label>
    <select id="statusFilter" onchange="filterOrders()">
      <option value="all">All</option>
      <option value="pending">Pending</option>
      <option value="transit">In Transit</option>
      <option value="delivered">Delivered</option>
    </select>
  </div>

  <div class="order-container" id="orders">
    <!-- Order cards are generated by JS -->
  </div>

  <button class="add-product" onclick="alert('Feature coming soon: Add Products!')">+ Add Product</button>

  <script>
    const ordersData = [
      {
        id: "001",
        shop: "Sai Provisions",
        address: "12 MG Road, Pune",
        items: "Rice, Wheat, Sugar",
        qty: "5, 10, 4",
        delivery: "28-Apr-2025",
        status: "pending"
      },
      {
        id: "002",
        shop: "Lakshmi Stores",
        address: "221B Market Street, Hyderabad",
        items: "Atta, Oil, Salt",
        qty: "7, 3, 6",
        delivery: "29-Apr-2025",
        status: "transit"
      },
      {
        id: "003",
        shop: "GreenMart",
        address: "45 Nehru Nagar, Chennai",
        items: "Maida, Ghee, Soap",
        qty: "8, 5, 2",
        delivery: "30-Apr-2025",
        status: "delivered"
      },
      {
        id: "004",
        shop: "FreshChoice",
        address: "7 Gandhi Road, Coimbatore",
        items: "Onion, Garlic, Oil",
        qty: "10, 4, 5",
        delivery: "28-Apr-2025",
        status: "pending"
      },
      {
        id: "005",
        shop: "DailyNeeds",
        address: "88 Hill Street, Mumbai",
        items: "Biscuits, Tea, Coffee",
        qty: "6, 3, 2",
        delivery: "30-Apr-2025",
        status: "transit"
      },
      {
        id: "006",
        shop: "Budget Bazaar",
        address: "3 JP Nagar, Bengaluru",
        items: "Rice, Milk, Soap",
        qty: "5, 8, 4",
        delivery: "01-May-2025",
        status: "delivered"
      }
    ];

    function generateOrderCard(order) {
      return `
        <div class="order-card" data-status="${order.status}">
          <div class="order-title">Order #${order.id}</div>
          <div class="order-detail">Shop Name: ${order.shop}</div>
          <div class="order-detail">Address: ${order.address}</div>
          <div class="order-detail">Items: ${order.items}</div>
          <div class="order-detail">Quantity: ${order.qty}</div>
          <div class="order-detail">Estimated Delivery: ${order.delivery}</div>
          <button class="status-btn">Mark as Delivered</button>
        </div>
      `;
    }

    function displayOrders(filter = "all") {
      const container = document.getElementById("orders");
      container.innerHTML = "";
      const filtered = ordersData.filter(order => filter === "all" || order.status === filter);
      filtered.forEach(order => {
        container.innerHTML += generateOrderCard(order);
      });
    }

    function filterOrders() {
      const selected = document.getElementById("statusFilter").value;
      displayOrders(selected);
    }

    // Initial render
    displayOrders();
  </script>
</body>
</html>
