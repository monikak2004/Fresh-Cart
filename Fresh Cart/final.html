<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Order Successful - Fresh Cart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f9fdf9;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #2e7d32;
    }

    .success-box {
      text-align: center;
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      max-width: 400px;
      animation: slideIn 0.6s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateY(50px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .checkmark-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: inline-block;
      border: 4px solid #4caf50;
      position: relative;
      margin-bottom: 20px;
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .checkmark-circle::after {
      content: '';
      position: absolute;
      left: 22px;
      top: 12px;
      width: 20px;
      height: 40px;
      border: solid #4caf50;
      border-width: 0 6px 6px 0;
      transform: rotate(45deg);
    }

    h1 {
      font-size: 28px;
      margin: 10px 0;
    }

    p {
      color: #4e944f;
      font-size: 16px;
      margin-bottom: 25px;
    }

    .home-button {
      padding: 12px 24px;
      font-size: 16px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      transition: background-color 0.3s ease;
    }

    .home-button:hover {
      background-color: #388e3c;
    }
  </style>
</head>
<body>
  <div class="success-box">
    <div class="checkmark-circle"></div>
    <h1>Order Confirmed!</h1>
    <p>Thank you for ordering from Fresh Cart. Your items are on the way!</p>
    <a href="index.html" class="home-button">Back to Home</a>
  </div>
</body>
</html>
