<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FreshCart</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Playfair Display', serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #e8f5e9; /* fresh green */
      overflow: hidden;
    }

    .container {
      text-align: center;
    }

    .title {
      font-size: 4em;
      color: #2e7d32; /* dark green */
      margin-bottom: 40px;
    }

    .cart {
      font-size: 9em;
      display: inline-block;
      animation: pushCart 4s ease-out forwards;
    }

    @keyframes pushCart {
      0% { transform: translateX(0); }
      100% { transform: translateX(110vw); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">FreshCart</h1>
    <div class="cart" id="cart">🛒</div>
  </div>

  <script>
    // Redirect immediately when animation ends
    const cart = document.getElementById("cart");
    cart.addEventListener("animationend", () => {
      window.location.href = "selection.html";
    });
  </script>
</body>
</html>
